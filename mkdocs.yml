site_name: Mineral Database
site_description: Crystal presets database for gemmological and mineralogical visualization
site_url: https://mineral-database.gemmology.dev
repo_url: https://github.com/gemmology-dev/mineral-database
repo_name: gemmology-dev/mineral-database

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2

nav:
  - Home: index.md
  - API Reference: api.md
  - 3D Models: models.md
  - CLI Usage: cli.md
  - Examples: examples.md
  - "Try interactive ↗": https://gemmology.dev/minerals/

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
  - tables

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gemmology-dev
      name: GitHub
    - icon: fontawesome/solid/flask
      link: https://gemmology.dev/playground/
      name: CDL Playground
    - icon: fontawesome/solid/graduation-cap
      link: https://gemmology.dev/quiz/
      name: Practice quiz
    - icon: fontawesome/solid/gem
      link: https://gemmology.dev/gallery/
      name: Crystal gallery
    - icon: fontawesome/solid/book
      link: https://gemmology.dev/learn/
      name: Learn (FGA)
