  name: Taaffeite
  cdl: |
    #! Species: Taaffeite (magnesiotaaffeite-2N'2S)
    #! System: Hexagonal (-3m; rhombohedral)
    #! Habit: Rounded to subhedral from alluvial reworking
    trigonal[-3m]:{10-10}@1.0 + {0001}@0.5 + {10-11}@0.7
  is_primary: true
  form_description: >
    One of the rarest gem minerals; BeMgAl4O8; hexagonal (trigonal rhombohedral symmetry).
    Birefringent (uniaxial negative) unlike isotropic spinel — polariscope DR test is the
    primary separation. Most gem material is alluvially reworked (Sri Lanka, Myanmar).
    FTIR/Raman required to distinguish from musgravite (magnesiotaaffeite-6N'3S).
  forms:
  - rhombohedron
  - prism
