    #! System: Hexagonal (-3m; rhombohedral)
    #! Habit: Alluvial rounded to subhedral grains
    trigonal[-3m]:{10-10}@1.0 + {0001}@0.5 + {10-11}@0.7
  is_primary: true
  form_description: >
    BeMg2Al6O12; hexagonal (trigonal rhombohedral). One of the rarest faceted gem minerals.
    Birefringent (uniaxial negative); distinguishes from spinel (isotropic) on polariscope.
    Separated from taaffeite by FTIR/Raman; slightly higher RI and SG but ranges overlap.
    Type locality: Musgrave Ranges, South Australia (1967).
  forms:
  - rhombohedron
