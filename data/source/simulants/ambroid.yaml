id: ambroid
name: Ambroid (Pressed Amber)
crystal_system: amorphous
point_group: none
chemistry: Compressed and fused amber chips (same chemical composition as amber — fossil resin; succinite for Baltic amber)
category: amber simulant
origin: simulant
target_minerals_json: '["amber"]'
year_first_produced: "1880"
hardness: "2-2.5"
sg: "1.05-1.09"
ri: "1.530-1.545"
birefringence: 0
optical_character: Isotropic
lustre: Resinous
cleavage: None
fracture: Conchoidal
colors: [Yellow, Orange-yellow, Orange; may show streaky swirling colour distribution from compression]
inclusions: [Elongated bubbles (from pressing process; diagnostic); streaky flow-lines; angular fragments of original amber chips visible under magnification at junction zones]
fluorescence: Blue-white (LWUV; similar to amber)
notes: >
  Ambroid is a simulant produced by compressing/fusing small amber chips and fragments under
  heat and pressure (autoclave compression); also called "reconstituted amber" or "pressed amber."
  Same chemistry as amber; FTIR spectrum matches amber (Baltic succinite shoulder ~1150 cm-1
  present). Main diagnostic: elongated/flattened bubbles from pressing process (natural amber
  has round spherical bubbles); streaky colour zones at chip boundaries visible under microscope;
  angular junction planes between compressed fragments. Float test identical to amber (SG
  1.05-1.09). RI identical to amber (1.530-1.545). Acetone test: ambroid resists acetone
  (like amber; fully polymerised) — distinguishes from copal. Gemmological knowledge from
  Read 7th ed. (DOI 10.4324/9780080507224) [PARTIALLY_SUPPORTED]. Introduced commercially
  c.1880s when amber scrap from cutting was compressed to make larger pieces.
  Note: ambroid is NOT an imitation of a different material — it IS amber (same composition)
  but reconstituted; the "simulant" classification reflects its commercial deception as
  "natural unmodified amber." Target: natural amber.
diagnostic_synthetic_features: >
  Elongated flattened bubbles (vs spherical in natural amber — most diagnostic under microscope);
  streaky colour zones at chip boundaries; angular junction planes between compressed fragments;
  FTIR: same as amber (not distinguishable by FTIR alone); float/acetone tests same as amber
expressions:
  - slug: default
    name: Ambroid (Pressed Amber)
    cdl: |
      #! Species: Ambroid (reconstituted/pressed amber)
      #! System: Amorphous (fossil resin)
      #! Habit: Massive; streaky colour zones from compression
      amorphous[resinous]:{massive}
    is_primary: true
    form_description: >
      Compressed and fused amber chips; amorphous fossil resin. Same chemistry as amber; FTIR
      cannot distinguish. Elongated flattened bubbles and angular chip-boundary zones visible
      under magnification are diagnostic. Resists acetone (unlike copal).
